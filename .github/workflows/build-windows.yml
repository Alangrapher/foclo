name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview pyinstaller openpyxl

      - name: Build release exe (no console)
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name Alangrapher `
            --add-data "ui;ui" `
            --hidden-import webview.platforms.edgechromium `
            --hidden-import webview.platforms.winforms `
            main.py

      - name: Build debug exe (with console)
        run: |
          pyinstaller `
            --onefile `
            --console `
            --name Alangrapher-debug `
            --add-data "ui;ui" `
            --hidden-import webview.platforms.edgechromium `
            --hidden-import webview.platforms.winforms `
            main.py

      - name: Upload release
        uses: actions/upload-artifact@v4
        with:
          name: Alangrapher-Windows
          path: dist/Alangrapher.exe

      - name: Upload debug
        uses: actions/upload-artifact@v4
        with:
          name: Alangrapher-Windows-DEBUG
          path: dist/Alangrapher-debug.exe
