name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.2)'
        required: true
        default: 'v1.0.1'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements-windows.txt

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $url = "https://files.jrsoftware.org/is/6/innosetup-6.3.1.exe"
          $installer = "$env:RUNNER_TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/SP-','/DIR=C:\innosetup' -Wait -NoNewWindow
          echo "C:\innosetup" >> $env:GITHUB_PATH

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -match 'refs/tags/v(.+)') {
            $ver = $matches[1]
          } else {
            $ver = "${{ github.event.inputs.version }}" -replace '^v', ''
          }
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: pyinstaller Foclo-windows.spec

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          & "C:\innosetup\ISCC.exe" /DVersion=${{ steps.version.outputs.version }} installer.iss

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Foclo-Setup-${{ steps.version.outputs.version }}.exe
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
