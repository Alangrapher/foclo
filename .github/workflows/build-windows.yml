name: Build Windows

on:
  push:
    branches: [main]
    paths-ignore:
      - 'Alangrapher.spec'       # macOS packaging only
      - 'AppIcon.icns'           # icon changes
      - 'README.md'              # docs
      - '.gitignore'
    tags:
      - 'win-v*'                 # trigger release on win version tags
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write      # needed for softprops/action-gh-release

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview pyinstaller openpyxl pystray Pillow

      - name: Build release exe (no console)
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name Alangrapher `
            --add-data "ui;ui" `
            --hidden-import webview.platforms.edgechromium `
            --hidden-import webview.platforms.winforms `
            main.py

      - name: Build debug exe (with console)
        run: |
          pyinstaller `
            --onefile `
            --console `
            --name Alangrapher-debug `
            --add-data "ui;ui" `
            --hidden-import webview.platforms.edgechromium `
            --hidden-import webview.platforms.winforms `
            main.py

      - name: Download WebView2 Evergreen Bootstrapper
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
            -OutFile "MicrosoftEdgeWebview2Setup.exe"

      - name: Extract version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/win-v')
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^win-v', ''
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Build installer (Inno Setup)
        run: |
          $ver = if ("${{ steps.version.outputs.version }}") { "${{ steps.version.outputs.version }}" } else { "0.0.0-dev" }
          iscc /DVersion=$ver installer.iss

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        if: github.ref_type != 'tag'
        with:
          name: Alangrapher-Windows
          path: |
            dist/Alangrapher.exe
            dist/Alangrapher-debug.exe
            dist/Alangrapher-Setup-*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/win-v')
        with:
          name: "Windows ${{ github.ref_name }}"
          body: |
            ## Windows ${{ github.ref_name }}

            ### Recommended: Installer
            Download `Alangrapher-Setup-*.exe` — double-click to install. It will automatically install the WebView2 runtime if needed.

            ### Alternative: Portable
            `Alangrapher.exe` — no install, just run. **Requires Microsoft Edge WebView2 Runtime** ([download](https://go.microsoft.com/fwlink/p/?LinkId=2124703) if you see a blank window).

            `Alangrapher-debug.exe` — same as above but with a console window for troubleshooting.

            ### Changes
            See [full changelog](https://github.com/Alangrapher/foclo/commits/main).
          files: |
            dist/Alangrapher-Setup-*.exe
            dist/Alangrapher.exe
            dist/Alangrapher-debug.exe
          draft: false
          prerelease: false
