name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.2)'
        required: true
        default: 'v1.0.1'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-windows.txt

      - name: Install Inno Setup
        run: choco install innosetup --version=6.3.1 -y --no-progress

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -match 'refs/tags/v(.+)') {
            $ver = $matches[1]
          } else {
            $ver = "${{ github.event.inputs.version }}" -replace '^v', ''
          }
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: pyinstaller Foclo-windows.spec

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc /DVersion=${{ steps.version.outputs.version }} installer.iss

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Foclo-Setup-${{ steps.version.outputs.version }}.exe
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
