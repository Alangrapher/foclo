name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview pyinstaller openpyxl pystray Pillow

      - name: Build release exe (no console)
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name Foclo `
            --add-data "ui;ui" `
            --hidden-import webview.platforms.edgechromium `
            --hidden-import webview.platforms.winforms `
            main.py

      - name: Build debug exe (with console)
        run: |
          pyinstaller `
            --onefile `
            --console `
            --name Foclo-debug `
            --add-data "ui;ui" `
            --hidden-import webview.platforms.edgechromium `
            --hidden-import webview.platforms.winforms `
            main.py

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -match 'refs/tags/v(.+)') {
            $ver = $matches[1]
          } else {
            $ver = "0.0.0-dev"
          }
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Build installer (Inno Setup)
        run: |
          iscc /DVersion=${{ steps.version.outputs.version }} installer.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Foclo v${{ steps.version.outputs.version }}"
          body: |
            ## Foclo v${{ steps.version.outputs.version }}

            ### Windows
            Download `Foclo-Setup-${{ steps.version.outputs.version }}.exe` — double-click to install.

            ### macOS
            See [latest macOS release](https://github.com/Alangrapher/foclo/releases/latest) for the DMG.
          files: |
            dist/Foclo-Setup-*.exe
            dist/Foclo.exe
            dist/Foclo-debug.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
