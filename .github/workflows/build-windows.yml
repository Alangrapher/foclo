name: Build Windows

on:
  push:
    branches: [main]
    paths-ignore:
      - 'Alangrapher.spec'       # macOS packaging only
      - 'AppIcon.icns'           # icon changes
      - 'README.md'              # docs
      - '.gitignore'
    tags:
      - 'win-v*'                 # trigger release on win version tags
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write      # needed for softprops/action-gh-release

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview pyinstaller openpyxl pystray Pillow

      - name: Build release exe (no console)
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name Alangrapher `
            --add-data "ui;ui" `
            --hidden-import webview.platforms.edgechromium `
            --hidden-import webview.platforms.winforms `
            main.py

      - name: Build debug exe (with console)
        run: |
          pyinstaller `
            --onefile `
            --console `
            --name Alangrapher-debug `
            --add-data "ui;ui" `
            --hidden-import webview.platforms.edgechromium `
            --hidden-import webview.platforms.winforms `
            main.py

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        if: github.ref_type != 'tag'
        with:
          name: Alangrapher-Windows
          path: dist/Alangrapher.exe

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        if: github.ref_type != 'tag'
        with:
          name: Alangrapher-Windows-DEBUG
          path: dist/Alangrapher-debug.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/win-v')
        with:
          name: "Windows ${{ github.ref_name }}"
          body: |
            ## Windows ${{ github.ref_name }}

            **Download:** `Alangrapher.exe` below — double-click to run. Windows SmartScreen may warn on first launch; click "More info" → "Run anyway".

            For console output (debugging): download `Alangrapher-debug.exe`.

            ### Changes
            See [full changelog](https://github.com/Alangrapher/foclo/commits/main).
          files: |
            dist/Alangrapher.exe
            dist/Alangrapher-debug.exe
          draft: false
          prerelease: false
